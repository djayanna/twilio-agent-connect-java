server:
  port: 8080

spring:
  application:
    name: twilio-agent-connect

  main:
    allow-circular-references: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=24h

twilio:
  agent-connect:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    api-key: ${TWILIO_API_KEY:}
    api-secret: ${TWILIO_API_SECRET:}
    conversation-configuration-id: ${TWILIO_CONVERSATION_CONFIGURATION_ID:}
    phone-number: ${TWILIO_PHONE_NUMBER:}
    voice-public-domain: ${TWILIO_VOICE_PUBLIC_DOMAIN:}

    memory:
      store-id: ${TWILIO_MEMORY_STORE_ID:}
      trait-groups: ${TWILIO_TRAIT_GROUPS:}
      mode: once # always, once, never

    idempotency:
      capacity: 10000
      ttl: 24h

    cache:
      provider: caffeine # caffeine, redis

    resilience:
      circuit-breaker:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
      retry:
        max-attempts: 3

    voice:
      enabled: true
      # Optional ConversationRelay settings - omitted from TwiML when unset,
      # letting Twilio apply its own defaults.
      voice: ${TWILIO_VOICE_TTS:}
      language: ${TWILIO_VOICE_LANGUAGE:}
      welcome-greeting: ${TWILIO_VOICE_WELCOME_GREETING:}
      # E.164 number dialed on human-agent handoff. When set, the relay TwiML
      # gets an action URL and the agent can transfer the caller to this number.
      handoff-agent-number: ${TWILIO_HANDOFF_AGENT_NUMBER:}

    channels:
      sms: true
      whatsapp: true
      rcs: false
      chat: true

logging:
  level:
    com.twilio.agentconnect: DEBUG
    reactor.netty: INFO
